name: Nuitka Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]
        include:
          - os: windows-latest
            suffix: ".exe"
          - os: ubuntu-latest
            suffix: ""
          - os: macos-latest
            suffix: ""

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 pillow tqdm nuitka zstandard

      # 核心优化：直接使用 -o 命名，完美避开所有系统重命名的坑
      - name: Build with Nuitka
        run: |
          python -m nuitka --onefile --assume-yes-for-downloads --disable-ccache --jobs=2 -o douyin_emoji-${{ runner.os }}${{ matrix.suffix }} --output-dir=build_out main.py

      - name: Create or Update Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build_out/douyin_emoji-${{ runner.os }}${{ matrix.suffix }}"
          allowUpdates: true
          tag: ${{ github.ref_name || 'latest-manual-build' }}
          body: "Auto-generated binaries for ${{ runner.os }}. Built with Nuitka."
          token: ${{ secrets.GITHUB_TOKEN }}
